<div class="record-viewer-container">
  <div class="header-section">
    <div class="back-button">
      <a routerLink=".." class="btn btn-secondary">← Back to Records</a>
    </div>
    <h2>Medical Record Details</h2>
  </div>

  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="!loading && error" class="alert alert-danger">
    {{ error }}
  </div>

  <div *ngIf="!loading && record" class="record-details">
    <div class="card">
      <div class="card-header">
        <h3>{{ getDocumentIcon(record.documentType) }} {{ record.documentType }}</h3>
      </div>
      <div class="card-body">
        <div class="detail-row">
          <label>File Name:</label>
          <span>{{ record.fileName }}</span>
        </div>
        <div class="detail-row">
          <label>Upload Date:</label>
          <span>{{ record.uploadDate | date : 'medium' }}</span>
        </div>
        <div class="detail-row">
          <label>File Size:</label>
          <span>{{ formatFileSize(record.size) }}</span>
        </div>
        <div class="detail-row" *ngIf="record.description">
          <label>Description:</label>
          <span>{{ record.description }}</span>
        </div>
        <div class="detail-row" *ngIf="record.status">
          <label>Status:</label>
          <span class="badge" [ngClass]="'bg-' + (record.status === 'APPROVED' ? 'success' : 'warning')">
            {{ record.status }}
          </span>
        </div>
      </div>
    </div>

    <!-- File Preview Section -->
    <div class="file-preview-section">
      <h4>Document Preview</h4>
      <div class="preview-container">
        <iframe [src]="record.fileUrl" class="document-preview"></iframe>
      </div>
    </div>

    <!-- Actions Section -->
    <div class="actions-section">
      <button class="btn btn-primary" (click)="downloadRecord()">
        ⬇️ Download File
      </button>
      <button class="btn btn-danger" (click)="deleteRecord()">
        🗑️ Delete Record
      </button>
    </div>
  </div>
</div>
