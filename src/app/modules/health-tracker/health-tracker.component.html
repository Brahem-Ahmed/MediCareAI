<div class="module-dashboard health-tracker">
  <div class="dashboard-header">
    <h2>Health Tracker Overview</h2>
    <p>Monitor daily metrics, goals, and personalized wellness trends.</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <h3>Active Devices</h3>
      <p class="stat-number">5</p>
      <span class="stat-change">Synced today</span>
    </div>
    <div class="stat-card">
      <h3>Goal Completion</h3>
      <p class="stat-number">78%</p>
      <span class="stat-change positive">+6% this week</span>
    </div>
    <div class="stat-card">
      <h3>Health Alerts</h3>
      <p class="stat-number">2</p>
      <span class="stat-change">Review recommended</span>
    </div>
  </div>

  <div class="quick-actions">
    <h3>Quick Actions</h3>
    <div class="action-grid">
      <a class="action-btn" routerLink="/health-tracker">Track Today</a>
      <a class="action-btn" routerLink="/appointments">Book Checkup</a>
      <a class="action-btn" routerLink="/pharmacy/prescriptions">View Prescriptions</a>
    </div>
  </div>
</div>
