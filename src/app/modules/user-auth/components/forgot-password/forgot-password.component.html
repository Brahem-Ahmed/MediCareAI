<div class="forgot-password-container">
  <div class="forgot-password-card">
    <!-- Header -->
    <div class="header">
      <h1>Reset Password</h1>
      <p class="subtitle">Recover access to your MediCareAI account</p>
    </div>

    <!-- Error Message -->
    <div class="alert alert-error" *ngIf="errorMessage">
      <span class="alert-icon">⚠️</span>
      {{ errorMessage }}
    </div>

    <!-- Success Message -->
    <div class="alert alert-success" *ngIf="successMessage">
      <span class="alert-icon">✓</span>
      {{ successMessage }}
    </div>

    <!-- Step 1: Email -->
    <div class="form-group" *ngIf="step === 1">
      <label for="email">Email Address</label>
      <input
        type="email"
        id="email"
        [(ngModel)]="email"
        placeholder="Enter your email address"
        class="form-control"
        [disabled]="isLoading"
      />
      <button
        class="btn btn-primary btn-block"
        (click)="onRequestReset()"
        [disabled]="isLoading || !email"
      >
        <span *ngIf="!isLoading">Send Reset Code</span>
        <span *ngIf="isLoading">Sending...</span>
      </button>
    </div>

    <!-- Step 2: Verification Code -->
    <div class="form-group" *ngIf="step === 2">
      <label for="code">Verification Code</label>
      <p class="info-text">We've sent a verification code to {{ email }}. Check your email and enter the code below.</p>
      <input
        type="text"
        id="code"
        [(ngModel)]="verificationCode"
        placeholder="Enter verification code"
        class="form-control"
        [disabled]="isLoading"
        maxlength="6"
      />
      <button
        class="btn btn-primary btn-block"
        (click)="onVerifyCode()"
        [disabled]="isLoading || !verificationCode"
      >
        Continue
      </button>
    </div>

    <!-- Step 3: New Password -->
    <div class="form-group" *ngIf="step === 3">
      <label for="newPassword">New Password</label>
      <div class="password-input-group">
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="newPassword"
          [(ngModel)]="newPassword"
          placeholder="Enter new password"
          class="form-control"
          [disabled]="isLoading"
        />
        <button
          type="button"
          class="toggle-password"
          (click)="togglePassword()"
          [disabled]="isLoading"
        >
          {{ showPassword ? '👁️' : '👁️‍🗨️' }}
        </button>
      </div>

      <!-- Password Strength Indicator -->
      <div class="password-strength" *ngIf="newPassword">
        <div class="strength-bar">
          <div
            class="strength-fill"
            [style.width.%]="getPasswordStrength().percentage"
            [style.backgroundColor]="getPasswordStrength().color"
          ></div>
        </div>
        <span class="strength-text" [style.color]="getPasswordStrength().color">
          {{ getPasswordStrength().strength }}
        </span>
      </div>

      <label for="confirmPassword">Confirm Password</label>
      <div class="password-input-group">
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          placeholder="Confirm new password"
          class="form-control"
          [disabled]="isLoading"
        />
        <button
          type="button"
          class="toggle-password"
          (click)="toggleConfirmPassword()"
          [disabled]="isLoading"
        >
          {{ showConfirmPassword ? '👁️' : '👁️‍🗨️' }}
        </button>
      </div>

      <button
        class="btn btn-primary btn-block"
        (click)="onResetPassword()"
        [disabled]="isLoading || !newPassword || !confirmPassword"
      >
        <span *ngIf="!isLoading">Reset Password</span>
        <span *ngIf="isLoading">Resetting...</span>
      </button>
    </div>

    <!-- Navigation -->
    <div class="navigation">
      <button
        *ngIf="step > 1"
        class="btn btn-secondary"
        (click)="previousStep()"
        [disabled]="isLoading"
      >
        ← Back
      </button>
      <button
        class="btn btn-secondary"
        (click)="goBackToLogin()"
      >
        Back to Login
      </button>
    </div>
  </div>
</div>
