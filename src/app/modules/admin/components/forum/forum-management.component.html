<div class="module-container">
  <div class="module-header">
    <h2>Forum Management</h2>
    <p>Monitor and manage community discussions</p>
  </div>

  <div *ngIf="loading" class="loading">Loading posts...</div>
  <div *ngIf="error" class="error-message">{{ error }}</div>

  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Author</th>
          <th>Replies</th>
          <th>Premium Only</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let post of posts">
          <td>{{ post.id }}</td>
          <td>{{ post.title }}</td>
          <td>{{ post.authorName }}</td>
          <td>{{ post.replyCount }}</td>
          <td><span class="status-badge" [class.active]="post.premiumOnly">{{ post.premiumOnly ? 'Yes' : 'No' }}</span></td>
          <td>{{ post.createdAt | date:'short' }}</td>
          <td>
            <button class="btn-icon">View</button>
            <button class="btn-icon btn-danger" (click)="deletePost(post.id!)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
